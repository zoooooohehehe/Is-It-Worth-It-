<!DOCTYPE html>
<html>
<head>
  <title>Is It Worth It?</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffa5c0;
      text-align: center;
      padding: 30px;
      overflow-x: hidden; /* Prevents scrollbars from animations */
    }

    /* --- THE NEW ANIMATED BORDERED TITLE --- */
    h1 {
      color: #ff0055;
      background: white;
      display: inline-block;
      padding: 15px 40px;
      border: 5px solid #ff0055;
      border-radius: 60px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
      animation: borderGlow 3s infinite ease-in-out, floatTitle 4s infinite ease-in-out;
      margin-bottom: 40px;
    }

    /* Pulsing border and glow color */
    @keyframes borderGlow {
      0%, 100% { border-color: #ff0055; box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); }
      50% { border-color: #ff66a3; box-shadow: 0 0 25px rgba(255, 0, 85, 0.5); }
    }

    /* Gentle floating motion */
    @keyframes floatTitle {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    /* --- THE STICKER --- */
    .sticker {
      width: 100px;
      height: 100px;
      position: absolute;
      top: 15px;
      right: 15px;
      transform: rotate(15deg);
      animation: stickerFloat 3s infinite ease-in-out;
      z-index: 10;
      object-fit: contain;
    }

    @keyframes stickerFloat {
      0%, 100% { transform: rotate(15deg) translateY(0); }
      50% { transform: rotate(20deg) translateY(-15px); }
    }

    /* --- CARD STYLES --- */
    .card {
      background: rgb(255, 0, 85);
      width: 350px;
      margin: auto;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      color: white;
      position: relative;
    }

    input, select, button {
      width: 95%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 2px solid transparent;
      display: block;
      margin-left: auto;
      margin-right: auto;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: #ffb3cc; }

    label {
      font-size: 11px;
      display: block;
      text-align: left;
      margin-left: 5%;
      margin-top: 12px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #ffd1e0;
    }

    button {
      background-color: white;
      color: rgb(255, 0, 85);
      font-weight: 900;
      cursor: pointer;
      margin-top: 20px;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    button:hover { 
      background-color: #fff0f5;
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      font-weight: 600;
      border: 1px dashed rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

<img src="assets/stickers.png" class="sticker" id="userSticker" alt="✨">

<h1>Is It Worth It? 🤔</h1>

<div class="card">
  <input type="text" id="product" placeholder="Product name (e.g. New Shoes)">

  <label>Price (₹)</label>
  <input type="number" id="price" placeholder="How much is it?">
  
  <label>Frequency</label>
  <select id="usage">
    <option value="7">Every Single Day</option>
    <option value="3">3 times a week</option>
    <option value="1">Once a week</option>
  </select>

  <label>Estimated Lifespan</label>
  <select id="lifespan">
    <option value="4">Disposable (1 Month)</option>
    <option value="26">Short term (6 Months)</option>
    <option value="52">Standard (1 Year)</option>
    <option value="156">Durable (3 Years)</option>
    <option value="520">Investment (10 Years)</option>
  </select>

  <button onclick="calculate()">Analyze Value</button>

  <div class="result" id="result">Waiting for details...</div>
</div>

<script>
function calculate() {
  const price = parseFloat(document.getElementById("price").value);
  const usesPerWeek = parseFloat(document.getElementById("usage").value);
  const weeks = parseFloat(document.getElementById("lifespan").value);

  if (!price || price <= 0) {
    document.getElementById("result").innerHTML = "Please enter a price! 💸";
    return;
  }

  const totalUses = Math.floor(usesPerWeek * weeks);
  const costPerUse = price / totalUses;

  let verdict = "";
  if (costPerUse < 10) verdict = "Absolute Steal! 🚀<br>Buy it immediately!";
  else if (costPerUse < 50) verdict = "Great Value! 👍<br>Totally worth it.";
  else if (costPerUse <= 150) verdict = "Think twice... 🤔<br>Maybe wait for a sale?";
  else verdict = "Total Rip-off! ❌<br>Don't do it!";

  document.getElementById("result").innerHTML =
    `Total uses: <strong>${totalUses}</strong> times<br>
     Cost per use: <strong>₹${costPerUse.toFixed(2)}</strong><br>
     <div style="margin-top:10px; font-size: 1.1rem;">${verdict}</div>`;
}
</script>

</body>
</html>
