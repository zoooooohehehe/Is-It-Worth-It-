<!DOCTYPE html>
<html>
<head>
  <title>Is It Worth It? | Smart Assistant</title>
  <style>
    :root {
      --bg-color: #ffa5c0;
      --card-color: rgb(255, 0, 85);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-color);
      text-align: center;
      padding: 30px;
      overflow-x: hidden;
      transition: background 0.8s ease;
    }

    /* --- THE ANIMATED BORDERED TITLE --- */
    h1 {
      color: #ff0055;
      background: white;
      display: inline-block;
      padding: 15px 40px;
      border: 5px solid #ff0055;
      border-radius: 60px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
      animation: borderGlow 3s infinite ease-in-out, floatTitle 3s infinite ease-in-out;
      margin-bottom: 40px;
    }

    @keyframes borderGlow {
      0%, 100% { border-color: #ff0055; box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); }
      50% { border-color: #ff66a3; box-shadow: 0 0 25px rgba(255, 0, 85, 0.5); }
    }

    @keyframes floatTitle {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    /* --- THE STICKER --- */
    .sticker-container {
      width: 100px;
      height: 100px;
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
      animation: stickerFloat 3s infinite ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    .sticker-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @keyframes stickerFloat {
      0%, 100% { transform: rotate(15deg) translateY(0); }
      50% { transform: rotate(25deg) translateY(-20px); }
    }

    /* --- CARD STYLES --- */
    .card {
      background: var(--card-color);
      width: 350px;
      margin: auto;
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      color: white;
      position: relative;
    }

    input, select, .btn {
      width: 95%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 2px solid transparent;
      display: block;
      margin-left: auto;
      margin-right: auto;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }

    input:focus { border-color: #ffb3cc; }

    label {
      font-size: 11px;
      display: block;
      text-align: left;
      margin-left: 5%;
      margin-top: 12px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #ffd1e0;
    }

    .btn {
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
    }

    .btn-main {
      background-color: white;
      color: rgb(255, 0, 85);
      margin-top: 20px;
    }

    .btn-main:hover { 
      background-color: #fff0f5;
      transform: scale(1.05);
    }

    .btn-reset {
      background-color: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 11px;
      margin-top: 5px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 15px;
      font-weight: 600;
      border: 1px dashed rgba(255, 255, 255, 0.3);
      line-height: 1.5;
    }

    .equivalent {
      margin-top: 10px;
      font-size: 0.85rem;
      background: rgba(0, 0, 0, 0.1);
      padding: 8px;
      border-radius: 10px;
      color: #fffdec;
    }

    /* --- HISTORY STYLES --- */
    .history-section {
      margin: 40px auto;
      width: 350px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 5px;
    }

    .history-title {
      color: white;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 13px;
    }

    .btn-clear {
      background: none;
      border: 1px solid white;
      color: white;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 20px;
      cursor: pointer;
      opacity: 0.7;
      transition: 0.3s;
    }

    .btn-clear:hover { opacity: 1; background: white; color: #ff0055; }

    .history-item {
      background: white;
      color: #ff0055;
      margin-bottom: 8px;
      padding: 12px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body onload="loadHistory()">

<div class="sticker-container">
  <img src="assets/stickers.png" class="sticker-img" onerror="this.style.display='none'; this.parentNode.innerHTML='✨';">
</div>

<h1>Is It Worth It? 🤔</h1>

<div class="card">
  <input type="text" id="product" placeholder="Product name (e.g. Leather Jacket)">

  <label>Price (₹)</label>
  <input type="number" id="price" placeholder="How much is it?">
  
  <label>Frequency</label>
  <select id="usage">
    <option value="7">Every Single Day</option>
    <option value="3">3 times a week</option>
    <option value="1">Once a week</option>
  </select>

  <label>Estimated Lifespan</label>
  <select id="lifespan">
    <option value="4">Disposable (1 Month)</option>
    <option value="26">Short term (6 Months)</option>
    <option value="52">Standard (1 Year)</option>
    <option value="156">Durable (3 Years)</option>
    <option value="520">Investment (10 Years)</option>
  </select>

  <button class="btn btn-main" onclick="calculate()">Analyze Value</button>
  <button class="btn btn-reset" onclick="resetForm()">Reset</button>

  <div class="result" id="result">Waiting for details...</div>
</div>

<div class="history-section" id="historySection" style="display: none;">
  <div class="history-header">
    <div class="history-title">Recent Checks 📜</div>
    <button class="btn-clear" onclick="clearHistory()">Clear All</button>
  </div>
  <div id="historyList"></div>
</div>

<script>
let history = [];

function calculate() {
  const productInput = document.getElementById("product");
  const priceInput = document.getElementById("price");
  
  const product = productInput.value || "Unnamed Item";
  const price = parseFloat(priceInput.value);
  const usesPerWeek = parseFloat(document.getElementById("usage").value);
  const weeks = parseFloat(document.getElementById("lifespan").value);

  if (!price || price <= 0) {
    document.getElementById("result").innerHTML = "Please enter a price! 💸";
    return;
  }

  const totalUses = Math.floor(usesPerWeek * weeks);
  const costPerUse = price / totalUses;

  let verdict = "";
  let bgColor = "#ffa5c0"; 
  let comparison = "";

  if (costPerUse < 10) {
    verdict = "Absolute Steal! 🚀";
    bgColor = "#a5ffcf";
    comparison = "That's cheaper than a pack of gum per use! 🍬";
  } else if (costPerUse < 30) {
    verdict = "Great Value! 👍";
    bgColor = "#a5e6ff";
    comparison = "Costs as much as a cutting chai per use. ☕";
  } else if (costPerUse < 100) {
    verdict = "Decent Choice. 🤔";
    bgColor = "#ffdaa5";
    comparison = "Costs as much as a Vada Pav per use. 🍔";
  } else if (costPerUse < 300) {
    verdict = "Pricey... 💸";
    bgColor = "#ffbba5";
    comparison = "That's like buying a Movie Ticket every time! 🎬";
  } else {
    verdict = "Total Rip-off! ❌";
    bgColor = "#ffa5a5";
    comparison = "You're basically buying a fancy dinner every use! 🍱";
  }

  document.body.style.background = bgColor;
  document.getElementById("result").innerHTML = `
    <strong>Total uses:</strong> ${totalUses} times<br>
    <strong>Cost per use:</strong> ₹${costPerUse.toFixed(2)}<br>
    <div style="margin-top:8px; font-size: 1.1rem;">${verdict}</div>
    <div class="equivalent">💡 ${comparison}</div>
  `;

  saveToHistory(product, costPerUse.toFixed(2));
}

function saveToHistory(name, cost) {
  const newItem = { name, cost };
  // Check if same item was just added to prevent duplicates
  if (history.length > 0 && history[0].name === name && history[0].cost === cost) return;

  history.unshift(newItem);
  if (history.length > 3) history.pop();
  
  localStorage.setItem('worthItHistory', JSON.stringify(history));
  updateHistoryUI();
}

function loadHistory() {
  const saved = localStorage.getItem('worthItHistory');
  if (saved) {
    history = JSON.parse(saved);
    updateHistoryUI();
  }
}

function clearHistory() {
  if (confirm("Clear your search history?")) {
    history = [];
    localStorage.removeItem('worthItHistory');
    updateHistoryUI();
  }
}

function updateHistoryUI() {
  const list = document.getElementById("historyList");
  const section = document.getElementById("historySection");
  
  if (history.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  list.innerHTML = "";
  
  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `<span>${item.name}</span> <span>₹${item.cost}/use</span>`;
    list.appendChild(div);
  });
}

function resetForm() {
  document.getElementById("product").value = "";
  document.getElementById("price").value = "";
  document.getElementById("usage").selectedIndex = 0;
  document.getElementById("lifespan").selectedIndex = 0;
  document.getElementById("result").innerHTML = "Waiting for details...";
  document.body.style.background = "#ffa5c0";
}
</script>

</body>
</html>
