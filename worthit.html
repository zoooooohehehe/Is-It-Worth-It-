<!DOCTYPE html>
<html>
<head>
  <title>Is It Worth It? | Smart Assistant</title>
  <style>
    :root {
      --bg-color: #ffa5c0;
      --card-color: rgb(255, 0, 85);
      --text-main: #ff0055;
      --winner-glow: #ffd700;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-color);
      text-align: center;
      padding: 20px;
      transition: background 0.8s ease;
      min-height: 100vh;
    }

    h1 {
      color: var(--text-main);
      background: white;
      display: inline-block;
      padding: 15px 40px;
      border: 5px solid var(--text-main);
      border-radius: 60px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* --- CHOICE SCREEN --- */
    #choiceScreen { margin-top: 50px; }
    .choice-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
    .choice-box {
      background: white;
      padding: 30px;
      border-radius: 25px;
      width: 200px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid transparent;
    }
    .choice-box:hover { transform: translateY(-10px); border-color: var(--text-main); }
    .choice-box h2 { color: var(--text-main); margin-bottom: 10px; }

    /* --- CARD STYLES --- */
    .card {
      background: var(--card-color);
      width: 320px;
      padding: 25px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      color: white;
      position: relative;
      margin: 10px auto;
    }

    input, select, .btn {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }

    label { font-size: 10px; display: block; text-align: left; text-transform: uppercase; font-weight: 800; color: #ffd1e0; margin-top: 8px; }

    .btn-main { background: white; color: var(--text-main); font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }

    /* --- BATTLE MODE --- */
    .battle-container { display: none; justify-content: center; gap: 20px; flex-wrap: wrap; max-width: 900px; margin: auto; }
    .card.winner { transform: scale(1.05); box-shadow: 0 0 30px var(--winner-glow); border: 4px solid var(--winner-glow); }
    .vs-circle { align-self: center; background: white; color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }

    /* --- VERDICT BOX --- */
    .verdict-box {
      margin-top: 15px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      font-weight: bold;
      border: 1px dashed rgba(255, 255, 255, 0.4);
    }

    /* --- HISTORY --- */
    .history-section { margin: 40px auto; width: 350px; text-align: left; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .history-title { color: white; font-weight: 800; font-size: 12px; text-transform: uppercase; }
    .btn-clear { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 4px 10px; border-radius: 15px; font-size: 10px; cursor: pointer; }
    .history-item { background: white; color: var(--text-main); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; animation: slideUp 0.3s ease-out; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }
    .back-btn { margin-top: 20px; background: none; border: 1px solid white; color: white; padding: 6px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body onload="loadHistory()">

  <h1>Is It Worth It? 🤔</h1>

  <div id="choiceScreen">
    <div class="choice-container">
      <div class="choice-box" onclick="showMode('single')">
        <h2>Single 🔎</h2>
        <p>Analyze one item.</p>
      </div>
      <div class="choice-box" onclick="showMode('battle')">
        <h2>Battle ⚔️</h2>
        <p>Compare two items.</p>
      </div>
    </div>
  </div>

  <div id="singleMode" class="hidden">
    <div class="card">
      <input type="text" id="nameS" placeholder="Item Name">
      <label>Price (₹)</label>
      <input type="number" id="priceS" placeholder="0.00">
      <label>Usage Frequency</label>
      <select id="usageS">
        <option value="7">Daily</option>
        <option value="3">3x Week</option>
        <option value="1">Weekly</option>
      </select>
      <label>Lifespan</label>
      <select id="lifeS">
        <option value="4">1 Month</option>
        <option value="26">6 Months</option>
        <option value="52">1 Year</option>
        <option value="156">3 Years</option>
      </select>
      <button class="btn btn-main" onclick="calculateSingle()">Analyze Verdict</button>
      <div id="resS" class="verdict-box" style="display:none;"></div>
    </div>
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <div id="battleMode" class="hidden">
    <div class="battle-container" id="battleFlex">
      <div class="card" id="cardA">
        <input type="text" id="nameA" placeholder="Option A">
        <label>Price (₹)</label>
        <input type="number" id="priceA">
        <label>Usage</label>
        <select id="usageA"><option value="7">Daily</option><option value="1">Weekly</option></select>
        <label>Lifespan</label>
        <select id="lifeA"><option value="52">1 Year</option><option value="156">3 Years</option></select>
        <div id="resA" style="margin-top:10px; font-weight:bold;"></div>
      </div>
      <div class="vs-circle">VS</div>
      <div class="card" id="cardB">
        <input type="text" id="nameB" placeholder="Option B">
        <label>Price (₹)</label>
        <input type="number" id="priceB">
        <label>Usage</label>
        <select id="usageB"><option value="7">Daily</option><option value="1">Weekly</option></select>
        <label>Lifespan</label>
        <select id="lifeB"><option value="52">1 Year</option><option value="156">3 Years</option></select>
        <div id="resB" style="margin-top:10px; font-weight:bold;"></div>
      </div>
    </div>
    <button class="btn btn-main" style="max-width:320px" onclick="calculateBattle()">Find Winner ⚔️</button>
    <br><button class="back-btn" onclick="goBack()">← Back</button>
  </div>

  <div class="history-section" id="historySection" style="display: none;">
    <div class="history-header">
      <div class="history-title">Recent History 📜</div>
      <button class="btn-clear" onclick="clearHistory()">Clear All</button>
    </div>
    <div id="historyList"></div>
  </div>

<script>
  let historyData = [];

  function loadHistory() {
    const saved = localStorage.getItem('worthItHistory');
    if (saved) { historyData = JSON.parse(saved); updateHistoryUI(); }
  }

  function showMode(mode) {
    document.getElementById('choiceScreen').classList.add('hidden');
    if (mode === 'single') document.getElementById('singleMode').classList.remove('hidden');
    else {
      document.getElementById('battleMode').classList.remove('hidden');
      document.getElementById('battleFlex').style.display = 'flex';
    }
  }

  function goBack() {
    location.reload(); // Simplest way to reset everything
  }

  function saveToHistory(name, cost) {
    historyData.unshift({ name, cost });
    if (historyData.length > 3) historyData.pop();
    localStorage.setItem('worthItHistory', JSON.stringify(historyData));
    updateHistoryUI();
  }

  function updateHistoryUI() {
    const section = document.getElementById('historySection');
    if (historyData.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    document.getElementById('historyList').innerHTML = historyData.map(item => `
      <div class="history-item"><span>${item.name}</span><span>₹${item.cost}/use</span></div>
    `).join('');
  }

  function clearHistory() {
    if(confirm("Delete history?")) {
      historyData = []; localStorage.removeItem('worthItHistory'); updateHistoryUI();
    }
  }

  function calculateSingle() {
    const name = document.getElementById('nameS').value || "Item";
    const p = parseFloat(document.getElementById('priceS').value);
    const u = parseFloat(document.getElementById('usageS').value);
    const l = parseFloat(document.getElementById('lifeS').value);
    if(!p) return alert("Enter price!");

    const cpu = (p / (u * l));
    let verdict = "";
    let color = "#ffa5c0";

    if (cpu < 15) { verdict = "Absolute Steal! <br> It's Totally Worth it!!!!🚀"; color = "#a5ffcf"; }
    else if (cpu < 60) { verdict = "It's a great deal i guess... 👍"; color = "#a5e6ff"; }
    else if (cpu <= 150) { verdict = "Think twice...<br>maybe not so worth it... 🤔"; color = "#ffdaa5"; }
    else { verdict = "Rip-off! ❌"; color = "#ffa5a5"; }

    document.body.style.background = color;
    const resDiv = document.getElementById('resS');
    resDiv.style.display = "block";
    resDiv.innerHTML = `₹${cpu.toFixed(2)} per use<br><span style="font-size:1.1rem">${verdict}</span>`;
    saveToHistory(name, cpu.toFixed(2));
  }

  function calculateBattle() {
    const pA = parseFloat(document.getElementById('priceA').value);
    const pB = parseFloat(document.getElementById('priceB').value);
    const uA = parseFloat(document.getElementById('usageA').value), lA = parseFloat(document.getElementById('lifeA').value);
    const uB = parseFloat(document.getElementById('usageB').value), lB = parseFloat(document.getElementById('lifeB').value);

    if(!pA || !pB) return alert("Enter prices!");

    const cpuA = (pA / (uA * lA)).toFixed(2);
    const cpuB = (pB / (uB * lB)).toFixed(2);

    document.getElementById('resA').innerHTML = `₹${cpuA}/use`;
    document.getElementById('resB').innerHTML = `₹${cpuB}/use`;

    document.getElementById('cardA').classList.remove('winner');
    document.getElementById('cardB').classList.remove('winner');

    if (parseFloat(cpuA) < parseFloat(cpuB)) {
      document.getElementById('cardA').classList.add('winner');
      saveToHistory(`${document.getElementById('nameA').value || 'A'} (Win)`, cpuA);
    } else {
      document.getElementById('cardB').classList.add('winner');
      saveToHistory(`${document.getElementById('nameB').value || 'B'} (Win)`, cpuB);
    }
  }
</script>
</body>
</html>
